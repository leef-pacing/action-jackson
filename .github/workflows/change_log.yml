name: Update CHANGELOG

on:
  workflow_dispatch:
  push:
    branches:
      - main
permissions:
  contents: write

jobs:
  update-date:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Add to CHANGELOG
        run: |
          TODAY=$(date +'%Y-%m-%d')
          # Get latest commit message and branch info
          LATEST_COMMIT=$(git log -1 --pretty=format:"%h - %s (%an)")
          # Prepend to CHANGELOG.md
          echo "## $TODAY - $LATEST_COMMIT" | cat - CHANGELOG.md > temp.md
          mv temp.md CHANGELOG.md

      - name: Commit CHANGELOG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "Update CHANGELOG" || echo "No changes to commit"
          git push